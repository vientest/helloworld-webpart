name: OrcasStrike Planning

on:
  workflow_dispatch:
    inputs:
      webpartId:
        description: Webpart definition id.
        required: true
      sessionId:
        description: Planning session id.
        required: true
      planningBranch:
        description: Branch containing the planning workspace.
        required: true
      correlationId:
        description: WebAPI dispatch correlation id.
        required: true

run-name: Planning ${{ inputs.webpartId }} / ${{ inputs.sessionId }} / ${{ inputs.correlationId }}

permissions:
  contents: write

jobs:
  planning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout planning workspace
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.planningBranch }}

      - name: Check whether planning changes are needed
        id: planning_needed
        shell: bash
        run: |
          python <<'PY'
          import json
          import os
          from pathlib import Path

          def load_json(path: Path):
              try:
                  with path.open("r", encoding="utf-8") as handle:
                      return json.load(handle)
              except (FileNotFoundError, json.JSONDecodeError):
                  return None

          def is_non_empty_string(value):
              return isinstance(value, str) and bool(value.strip())

          request = load_json(Path("context/input.json")) or {}
          request_details = request.get("request") or {}
          user_message = (request.get("userMessage") or "").strip()

          plan = load_json(Path("plan/details.json"))
          proposed_screens = load_json(Path("design/proposed-screens.json"))

          plan_matches_request = isinstance(plan, dict) and (
              plan.get("id") == request_details.get("webpartId")
              and plan.get("title") == request_details.get("title")
              and plan.get("description") == request_details.get("description")
              and is_non_empty_string(plan.get("summary"))
              and isinstance(plan.get("runtimeBehavior"), dict)
              and is_non_empty_string(plan["runtimeBehavior"].get("summary"))
              and isinstance(plan.get("resources"), list)
              and isinstance(plan.get("runtimeParameters"), dict)
          )

          screens_match_request = isinstance(proposed_screens, dict) and (
              proposed_screens.get("webpartId") == request_details.get("webpartId")
              and isinstance(proposed_screens.get("screens"), list)
          )

          should_run = bool(user_message) or not (
              plan_matches_request and screens_match_request
          )
          reason = (
              "planning input requires Codex changes"
              if should_run
              else "planning workspace already matches an empty request"
          )

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"should_run={'true' if should_run else 'false'}\n")
              output.write(f"reason={reason}\n")
          PY

      - name: Check OpenAI secret
        if: steps.planning_needed.outputs.should_run == 'true'
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY secret is not available to this repository." >&2
            exit 1
          fi

      - name: Run Codex planning
        if: steps.planning_needed.outputs.should_run == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          allow-bots: "true"
          allow-bot-users: "spfxautomation[bot]"
          prompt: |
            You are updating an OrcasStrike SPFx automation planning workspace.

            Read:
            - README.md
            - context/input.json
            - context/sharepoint-resources.json
            - plan/details.schema.md
            - design/proposed-screens.schema.md

            Update only:
            - plan/details.json
            - design/proposed-screens.json
            - design/previews/*

            Do not modify runtime source, build output, workflow files, integration metadata, package files, or repository settings.
            Do not invent SharePoint list columns that are not present in context/sharepoint-resources.json.
            Preserve the runtime contract described in runtime-contract.md.
            Create or refine the plan for the user message stored in context/input.json.

      - name: Skip no-op planning request
        if: steps.planning_needed.outputs.should_run != 'true'
        shell: bash
        run: |
          echo "${{ steps.planning_needed.outputs.reason }}."

      - name: Commit planning output
        if: steps.planning_needed.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plan/details.json design/proposed-screens.json design/previews
          if git diff --cached --quiet; then
            echo "Codex did not produce planning output changes." >&2
            exit 1
          fi
          git commit -m "Update planning output for ${{ inputs.webpartId }}"
          git push origin "HEAD:${{ inputs.planningBranch }}"
